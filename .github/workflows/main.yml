name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      # FIX 2 & 3: Add base path and inject Gemini API Key
      - name: Build project
        # IMPORTANT: Replace '/YOUR-REPO-NAME/' with your actual GitHub repository name!
        # Example: if your repo is github.com/johndoe/habits, use --base=/habits/
        run: npm run build -- --base=/YOUR-REPO-NAME/
        env:
          # You must add this key in your GitHub Repo -> Settings -> Secrets and variables -> Actions
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
      # FIX 1: Copy index.html to 404.html to fix React Router refreshes
      - name: Fix React Router 404s
        run: cp dist/index.html dist/404.html
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
